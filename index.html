<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAA Bracket Challenge 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  padding: 12px;
  min-height: 100vh;
}
h1 {
  text-align: center;
  font-size: 1.6em;
  margin-bottom: 2px;
  background: linear-gradient(90deg, #ff6b35, #f7c948);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 14px;
  font-size: 0.85em;
}
.updated {
  text-align: center;
  color: #666;
  font-size: 0.75em;
  margin-bottom: 16px;
}
.scoring-info {
  max-width: 1100px;
  margin: 0 auto 12px;
  padding: 8px 12px;
  background: #16213e;
  border-radius: 8px;
  font-size: 0.7em;
  color: #888;
  text-align: center;
  line-height: 1.5;
}
.legend {
  max-width: 1100px;
  margin: 0 auto 12px;
  padding: 8px 12px;
  background: #16213e;
  border-radius: 8px;
  font-size: 0.75em;
  color: #888;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-green { background: #4ecca3; }
.dot-red { background: #e74c3c; }
#output { max-width: 1100px; margin: 0 auto; }
.error { color: #e74c3c; text-align: center; padding: 40px; font-size: 1.2em; }

/* ---- CARD LAYOUT (mobile-first) ---- */
.cards { display: flex; flex-direction: column; gap: 8px; }
.card {
  background: #16213e;
  border-radius: 10px;
  padding: 12px 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.card.rank1 { border-left: 3px solid #f7c948; }
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.card-rank {
  font-size: 1.1em;
  font-weight: bold;
  color: #f7c948;
  min-width: 28px;
}
.card-name {
  font-weight: 600;
  font-size: 1.05em;
  flex: 1;
  margin-left: 6px;
}
.card-score {
  font-size: 1.5em;
  font-weight: bold;
  color: #4ecca3;
  margin-left: 8px;
}
.card-max {
  font-size: 0.8em;
  color: #888;
  margin-left: 4px;
}
.card-mid {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.card-champ {
  font-size: 0.85em;
  font-weight: 600;
}
.champ-alive { color: #4ecca3; }
.champ-dead { color: #e74c3c; text-decoration: line-through; }
.card-rounds {
  display: flex;
  gap: 2px;
}
.round-pip {
  flex: 1;
  text-align: center;
  font-size: 0.65em;
  padding: 3px 0;
  border-radius: 3px;
  background: #0f1a30;
}
.round-pip .rnd-label {
  color: #666;
  display: block;
  font-size: 0.85em;
  margin-bottom: 1px;
}
.round-pip .rnd-val { font-weight: 600; }
.rnd-has { color: #4ecca3; }
.rnd-zero { color: #444; }

/* ---- TABLE LAYOUT (desktop) ---- */
.standings-table { display: none; }
table {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto 20px;
  border-collapse: collapse;
  background: #16213e;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
th {
  background: #0f3460;
  padding: 12px 8px;
  text-align: center;
  font-size: 0.85em;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #f7c948;
  border-bottom: 2px solid #f7c948;
}
th:first-child, td:first-child { text-align: center; width: 50px; }
th:nth-child(2), td:nth-child(2) { text-align: left; padding-left: 16px; }
td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid #1a1a3e;
  font-size: 0.9em;
}
tr:hover { background: #1a2a4e; }
tr.rank1 { background: #1a2a3e; }
tr.rank1 td { font-weight: bold; }
.score { font-size: 1.3em; font-weight: bold; color: #4ecca3; }
.max-possible { color: #888; font-size: 0.85em; }
.name-cell { font-weight: 600; }
.rank-cell { font-size: 1.1em; font-weight: bold; color: #f7c948; }
.round-correct { color: #4ecca3; }
.round-zero { color: #555; }

@media (min-width: 768px) {
  body { padding: 20px; }
  h1 { font-size: 2em; }
  .cards { display: none; }
  .standings-table { display: block; }
  .scoring-info { font-size: 0.8em; }
}
</style>
</head>
<body>
<h1>NCAA Bracket Challenge 2026</h1>
<div class="subtitle">Friends of Steve Bracket Challenge</div>
<div id="output"><div style="text-align:center;padding:40px;color:#888;">Loading...</div></div>
<script>
var SCORING = [1, 2, 3, 5, 8, 13];
var REGIONS = ['east', 'south', 'west', 'midwest'];
var ROUND_KEYS = ['round1', 'round2', 'sweet16', 'elite8'];
var ROUND_SIZES = [8, 4, 2, 1];
var ROUND_LABELS = ['R64', 'R32', 'S16', 'E8', 'FF', 'NCG'];
var PICK_FILES = [
  'brady', 'steve', 'gracie', 'kristy', 'kylan', 'larry',
  'laura', 'lisa', 'molly', 'peggy', 'sammy', 'shawn'
];

function getEliminated(results) {
  var elim = {};
  var i, j, g, rr;
  for (i = 0; i < REGIONS.length; i++) {
    rr = results.results[REGIONS[i]];
    for (j = 0; j < 8; j++) {
      g = rr.round1[j];
      if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
    }
    for (j = 0; j < 4; j++) {
      g = rr.round2[j];
      if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
    }
    for (j = 0; j < 2; j++) {
      g = rr.sweet16[j];
      if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
    }
    g = rr.elite8;
    if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
  }
  var ff = results.final_four;
  if (ff.semifinal1 && ff.semifinal1.status === 'final' && ff.semifinal1.loser) elim[ff.semifinal1.loser] = true;
  if (ff.semifinal2 && ff.semifinal2.status === 'final' && ff.semifinal2.loser) elim[ff.semifinal2.loser] = true;
  if (ff.championship && ff.championship.status === 'final' && ff.championship.loser) elim[ff.championship.loser] = true;
  return elim;
}

function scorePicks(picks, results, eliminated) {
  var score = 0;
  var maxPossible = 0;
  var roundCorrect = [0, 0, 0, 0, 0, 0];
  var i, j, k, rr, rp, g, pick, roundIdx;

  for (i = 0; i < REGIONS.length; i++) {
    rr = results.results[REGIONS[i]];
    rp = picks.regions[REGIONS[i]];

    for (k = 0; k < ROUND_KEYS.length; k++) {
      roundIdx = k;
      var pts = SCORING[k];
      if (k < 3) {
        var arr = rr[ROUND_KEYS[k]];
        var parr = rp[ROUND_KEYS[k]];
        for (j = 0; j < ROUND_SIZES[k]; j++) {
          g = arr[j];
          pick = parr[j];
          if (g && g.status === 'final') {
            if (g.winner === pick) {
              score += pts;
              maxPossible += pts;
              roundCorrect[roundIdx]++;
            }
          } else {
            if (!eliminated[pick]) {
              maxPossible += pts;
            }
          }
        }
      } else {
        g = rr.elite8;
        pick = rp.elite8;
        if (g && g.status === 'final') {
          if (g.winner === pick) {
            score += pts;
            maxPossible += pts;
            roundCorrect[roundIdx]++;
          }
        } else {
          if (!eliminated[pick]) {
            maxPossible += pts;
          }
        }
      }
    }
  }

  var ff = results.final_four;
  var pfour = picks.final_four;

  var semi1pick = pfour.east_south_winner;
  if (ff.semifinal1 && ff.semifinal1.status === 'final') {
    if (ff.semifinal1.winner === semi1pick) {
      score += SCORING[4];
      maxPossible += SCORING[4];
      roundCorrect[4]++;
    }
  } else {
    if (!eliminated[semi1pick]) maxPossible += SCORING[4];
  }

  var semi2pick = pfour.west_midwest_winner;
  if (ff.semifinal2 && ff.semifinal2.status === 'final') {
    if (ff.semifinal2.winner === semi2pick) {
      score += SCORING[4];
      maxPossible += SCORING[4];
      roundCorrect[4]++;
    }
  } else {
    if (!eliminated[semi2pick]) maxPossible += SCORING[4];
  }

  var champPick = picks.champion;
  if (ff.championship && ff.championship.status === 'final') {
    if (ff.championship.winner === champPick) {
      score += SCORING[5];
      maxPossible += SCORING[5];
      roundCorrect[5]++;
    }
  } else {
    if (!eliminated[champPick]) maxPossible += SCORING[5];
  }

  return {
    score: score,
    maxPossible: maxPossible,
    roundCorrect: roundCorrect,
    champEliminated: !!eliminated[picks.champion]
  };
}

function render(tournament, results, allPicks) {
  var eliminated = getEliminated(results);
  var standings = [];
  var i;

  for (i = 0; i < allPicks.length; i++) {
    var p = allPicks[i];
    var s = scorePicks(p, results, eliminated);
    standings.push({
      name: p.participant,
      champion: p.champion,
      notes: p.notes || '',
      score: s.score,
      maxPossible: s.maxPossible,
      roundCorrect: s.roundCorrect,
      champEliminated: s.champEliminated
    });
  }

  standings.sort(function(a, b) {
    if (b.score !== a.score) return b.score - a.score;
    return b.maxPossible - a.maxPossible;
  });

  var html = '';

  html += '<div class="scoring-info">';
  html += 'R64=1 | R32=2 | S16=3 | E8=5 | FF=8 | Champ=13';
  html += '</div>';

  html += '<div class="legend">';
  html += '<span><span class="dot dot-green"></span> Champ alive</span>';
  html += '<span><span class="dot dot-red"></span> Champ eliminated</span>';
  html += '</div>';

  /* ---- MOBILE CARDS ---- */
  html += '<div class="cards">';
  for (i = 0; i < standings.length; i++) {
    var st = standings[i];
    var cardCls = i === 0 ? 'card rank1' : 'card';
    html += '<div class="' + cardCls + '">';

    html += '<div class="card-top">';
    html += '<span class="card-rank">#' + (i + 1) + '</span>';
    html += '<span class="card-name">' + st.name + '</span>';
    html += '<span class="card-score">' + st.score + '</span>';
    html += '<span class="card-max">/' + st.maxPossible + '</span>';
    html += '</div>';

    html += '<div class="card-mid">';
    var champClass = st.champEliminated ? 'champ-dead' : 'champ-alive';
    var champIcon = st.champEliminated ? '\u274C ' : '\uD83C\uDFC6 ';
    html += '<span class="card-champ ' + champClass + '">' + champIcon + st.champion + '</span>';
    html += '</div>';

    html += '<div class="card-rounds">';
    for (var r = 0; r < 6; r++) {
      var val = st.roundCorrect[r];
      var valCls = val > 0 ? 'rnd-has' : 'rnd-zero';
      html += '<div class="round-pip">';
      html += '<span class="rnd-label">' + ROUND_LABELS[r] + '</span>';
      html += '<span class="rnd-val ' + valCls + '">' + val + '</span>';
      html += '</div>';
    }
    html += '</div>';

    html += '</div>';
  }
  html += '</div>';

  /* ---- DESKTOP TABLE ---- */
  html += '<div class="standings-table">';
  html += '<table>';
  html += '<tr>';
  html += '<th>Rank</th>';
  html += '<th>Name</th>';
  html += '<th>Score</th>';
  html += '<th>Max</th>';
  html += '<th>Champion</th>';
  for (var h = 0; h < 6; h++) {
    html += '<th>' + ROUND_LABELS[h] + '</th>';
  }
  html += '</tr>';

  for (i = 0; i < standings.length; i++) {
    var st2 = standings[i];
    var rankClass = i === 0 ? ' class="rank1"' : '';
    html += '<tr' + rankClass + '>';
    html += '<td class="rank-cell">' + (i + 1) + '</td>';
    html += '<td class="name-cell">' + st2.name + '</td>';
    html += '<td class="score">' + st2.score + '</td>';
    html += '<td class="max-possible">' + st2.maxPossible + '</td>';

    var champClass2 = st2.champEliminated ? 'champ-dead' : 'champ-alive';
    var champDisplay2 = st2.champion;
    if (st2.champEliminated) {
      champDisplay2 = '\u274C ' + st2.champion;
    }
    html += '<td class="' + champClass2 + '">' + champDisplay2 + '</td>';

    for (var r2 = 0; r2 < 6; r2++) {
      var val2 = st2.roundCorrect[r2];
      var cls2 = val2 > 0 ? 'round-correct' : 'round-zero';
      html += '<td class="' + cls2 + '">' + val2 + '</td>';
    }

    html += '</tr>';
  }

  html += '</table>';
  html += '</div>';

  html += '<div class="updated">Last updated: ' + results.last_updated + ' | Source: ' + results.source + '</div>';

  document.getElementById('output').innerHTML = html;
}

function run() {
  var tournamentData, resultsData;
  var pickPromises = [];
  var allPicks = [];
  var i;
  var bust = '?v=' + Date.now();

  Promise.all([
    fetch('data/tournament.json' + bust).then(function(r) { return r.json(); }),
    fetch('data/results.json' + bust).then(function(r) { return r.json(); })
  ]).then(function(baseData) {
    tournamentData = baseData[0];
    resultsData = baseData[1];

    var fetches = [];
    for (i = 0; i < PICK_FILES.length; i++) {
      fetches.push(
        fetch('data/picks/' + PICK_FILES[i] + '.json' + bust).then(function(r) { return r.json(); })
      );
    }
    return Promise.all(fetches);
  }).then(function(picks) {
    allPicks = picks;
    render(tournamentData, resultsData, allPicks);
  }).catch(function(err) {
    document.getElementById('output').innerHTML = '<div class="error">Error loading data: ' + err.message + '</div>';
  });
}

run();
</script>
</body>
</html>
