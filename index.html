<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAA Bracket Challenge 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  padding: 12px;
  min-height: 100vh;
}
h1 {
  text-align: center;
  font-size: 1.6em;
  margin-bottom: 2px;
  background: linear-gradient(90deg, #ff6b35, #f7c948);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 14px;
  font-size: 0.85em;
}
.updated {
  text-align: center;
  color: #666;
  font-size: 0.75em;
  margin-bottom: 16px;
}
.card-winpct {
  font-size: 0.78em;
  color: #888;
  padding: 2px 10px 0;
}
.sam-dots span {
  opacity: 0;
  animation: samDot 1.4s infinite;
}
.sam-dots span:nth-child(1) { animation-delay: 0s; }
.sam-dots span:nth-child(2) { animation-delay: 0.25s; }
.sam-dots span:nth-child(3) { animation-delay: 0.5s; }
@keyframes samDot {
  0%, 55%, 100% { opacity: 0; }
  25% { opacity: 1; }
}
.scoring-info {
  max-width: 1100px;
  margin: 0 auto 12px;
  padding: 8px 12px;
  background: #16213e;
  border-radius: 8px;
  font-size: 0.7em;
  color: #888;
  text-align: center;
  line-height: 1.5;
}
.legend {
  max-width: 1100px;
  margin: 0 auto 12px;
  padding: 8px 12px;
  background: #16213e;
  border-radius: 8px;
  font-size: 0.75em;
  color: #888;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-green { background: #4ecca3; }
.dot-red { background: #e74c3c; }
#output { max-width: 1100px; margin: 0 auto; }
.error { color: #e74c3c; text-align: center; padding: 40px; font-size: 1.2em; }

/* ---- CARD LAYOUT (mobile-first) ---- */
.cards { display: flex; flex-direction: column; gap: 8px; }
.card {
  background: #16213e;
  border-radius: 10px;
  padding: 12px 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  cursor: pointer;
  transition: background 0.15s;
}
.card:active { background: #1a2a4e; }
.card.rank1 { border-left: 3px solid #f7c948; }
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.card-rank {
  font-size: 1.1em;
  font-weight: bold;
  color: #f7c948;
  min-width: 28px;
}
.card-name {
  font-weight: 600;
  font-size: 1.05em;
  flex: 1;
  margin-left: 6px;
}
.card-score {
  font-size: 1.5em;
  font-weight: bold;
  color: #4ecca3;
  margin-left: 8px;
}
.card-max {
  font-size: 0.8em;
  color: #888;
  margin-left: 4px;
}
.card-mid {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.card-champ {
  font-size: 0.85em;
  font-weight: 600;
}
.champ-alive { color: #4ecca3; }
.champ-dead { color: #e74c3c; text-decoration: line-through; }
.card-watch {
  font-size: 0.78em;
  color: #b8b8b8;
  margin-bottom: 6px;
  padding: 4px 8px;
  background: #0f1a30;
  border-radius: 4px;
  border-left: 2px solid #f7c948;
}
.card-watch .watch-icon { margin-right: 3px; }
.card-watch .watch-team { color: #f7c948; font-weight: 600; }
.card-watch .watch-reason { color: #888; }
.card-style {
  font-size: 0.75em;
  color: #c084fc;
  font-style: italic;
  margin-bottom: 4px;
}
.style-pts {
  font-size: 0.78em;
  color: #c084fc;
  font-style: italic;
  max-width: 140px;
}
.card-badge {
  font-size: 0.75em;
  color: #c9a0dc;
  margin-bottom: 4px;
  font-style: italic;
}
.card-perfect {
  font-size: 0.72em;
  color: #f7c948;
  margin-bottom: 4px;
}
.card-rounds {
  display: flex;
  gap: 2px;
}
.round-pip {
  flex: 1;
  text-align: center;
  font-size: 0.65em;
  padding: 3px 0;
  border-radius: 3px;
  background: #0f1a30;
}
.round-pip .rnd-label {
  color: #666;
  display: block;
  font-size: 0.85em;
  margin-bottom: 1px;
}
.round-pip .rnd-val { font-weight: 600; }
.rnd-has { color: #4ecca3; }
.rnd-zero { color: #444; }

/* ---- TABLE LAYOUT (desktop) ---- */
.standings-table { display: none; }
table {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto 20px;
  border-collapse: collapse;
  background: #16213e;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
th {
  background: #0f3460;
  padding: 12px 8px;
  text-align: center;
  font-size: 0.85em;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #f7c948;
  border-bottom: 2px solid #f7c948;
}
th:first-child, td:first-child { text-align: center; width: 50px; }
th:nth-child(2), td:nth-child(2) { text-align: left; padding-left: 16px; }
td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid #1a1a3e;
  font-size: 0.9em;
}
tr:hover { background: #1a2a4e; }
tr.rank1 { background: #1a2a3e; }
tr.rank1 td { font-weight: bold; }
.score { font-size: 1.3em; font-weight: bold; color: #4ecca3; }
.max-possible { color: #888; font-size: 0.85em; }
.name-cell { font-weight: 600; cursor: pointer; }
.name-cell:hover { color: #f7c948; }
.rank-cell { font-size: 1.1em; font-weight: bold; color: #f7c948; }
.round-correct { color: #4ecca3; }
.round-zero { color: #555; }

/* ---- DETAIL VIEW ---- */
.detail-view { max-width: 600px; margin: 0 auto; }
.back-btn {
  display: inline-block;
  padding: 8px 14px;
  margin-bottom: 12px;
  background: #0f3460;
  color: #f7c948;
  border: none;
  border-radius: 6px;
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
}
.back-btn:active { background: #1a4a7e; }
.detail-header {
  background: #16213e;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
  text-align: center;
}
.detail-name { font-size: 1.4em; font-weight: 700; margin-bottom: 4px; }
.detail-score-line { font-size: 1.1em; margin-bottom: 4px; }
.detail-score-num { color: #4ecca3; font-weight: bold; font-size: 1.3em; }
.detail-max-num { color: #888; }
.detail-champ { font-size: 0.95em; font-weight: 600; margin-bottom: 4px; }
.detail-path {
  font-size: 0.8em;
  color: #888;
  margin-top: 6px;
}
.detail-path .path-team { font-weight: 600; }
.region-section {
  background: #16213e;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.region-title {
  font-size: 0.9em;
  font-weight: 700;
  text-transform: uppercase;
  color: #f7c948;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #2a3a5e;
}
.round-row {
  margin-bottom: 6px;
}
.round-label {
  font-size: 0.7em;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.pick-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.pick-chip {
  font-size: 0.78em;
  padding: 3px 8px;
  border-radius: 4px;
  background: #0f1a30;
  white-space: nowrap;
}
.pick-correct { color: #4ecca3; border-left: 2px solid #4ecca3; }
.pick-wrong { color: #e74c3c; text-decoration: line-through; border-left: 2px solid #e74c3c; }
.pick-doomed { color: #666; text-decoration: line-through; border-left: 2px solid #444; }
.pick-pending { color: #ccc; border-left: 2px solid #555; }
.ff-section {
  background: #16213e;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.ff-title {
  font-size: 0.9em;
  font-weight: 700;
  text-transform: uppercase;
  color: #f7c948;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #2a3a5e;
}
.ff-game {
  margin-bottom: 6px;
  font-size: 0.85em;
}
.ff-label { color: #888; font-size: 0.8em; }

/* ---- WHAT IF MODE ---- */
.whatif-panel {
  max-width: 1100px;
  margin: 0 auto 12px;
  background: #16213e;
  border-radius: 8px;
  padding: 10px 12px;
}
.whatif-toggle {
  display: block;
  width: 100%;
  padding: 8px;
  background: #0f3460;
  color: #f7c948;
  border: none;
  border-radius: 6px;
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.whatif-toggle:active { background: #1a4a7e; }
.whatif-body { display: none; margin-top: 10px; }
.whatif-body.open { display: block; }
.whatif-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.whatif-row.locked { opacity: 0.5; }
.whatif-row select {
  padding: 6px 8px;
  border-radius: 4px;
  border: 1px solid #2a3a5e;
  background: #0f1a30;
  color: #e0e0e0;
  font-size: 0.82em;
  flex: 1;
  min-width: 100px;
}
.whatif-row select:disabled { opacity: 0.4; }
.whatif-row .wi-label {
  color: #888;
  font-size: 0.8em;
  white-space: nowrap;
}
.whatif-row button {
  padding: 4px 10px;
  border-radius: 4px;
  border: none;
  font-size: 0.78em;
  cursor: pointer;
  white-space: nowrap;
}
.wi-delete { background: #5c2020; color: #e74c3c; }
.wi-lock-icon { color: #f7c948; font-size: 0.8em; }
.whatif-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}
.whatif-actions button {
  padding: 6px 12px;
  border-radius: 4px;
  border: none;
  font-size: 0.8em;
  cursor: pointer;
}
.wi-add { background: #1a4a3e; color: #4ecca3; }
.wi-reset { background: #3a2020; color: #e74c3c; }
.whatif-banner {
  max-width: 1100px;
  margin: 0 auto 12px;
  padding: 10px 14px;
  background: linear-gradient(90deg, #5c2020, #8b3a3a, #5c2020);
  border-radius: 8px;
  text-align: center;
  font-weight: 700;
  color: #ff6b6b;
  animation: wiBannerPulse 2s ease-in-out infinite;
}
@keyframes wiBannerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.whatif-banner .wi-banner-title { font-size: 1em; margin-bottom: 4px; }
.whatif-banner .wi-banner-desc { font-size: 0.75em; color: #ccc; font-weight: 400; }
.whatif-banner .wi-banner-stack { font-size: 0.8em; color: #ffaa88; }

@media (min-width: 768px) {
  body { padding: 20px; }
  h1 { font-size: 2em; }
  .cards { display: none; }
  .standings-table { display: block; }
  .scoring-info { font-size: 0.8em; }
  .detail-view .cards { display: flex; }
}
</style>
</head>
<body>
<h1>NCAA Bracket Challenge 2026</h1>
<div class="subtitle">Friends of Steve Bracket Challenge</div>
<div id="output"><div style="text-align:center;padding:40px;color:#888;">Loading...</div></div>
<script>
var SCORING = [1, 2, 3, 5, 8, 13];
var REGIONS = ['east', 'south', 'west', 'midwest'];
var REGION_NAMES = {east:'East', south:'South', west:'West', midwest:'Midwest'};
var ROUND_KEYS = ['round1', 'round2', 'sweet16', 'elite8'];
var ROUND_NAMES = ['Round of 64', 'Round of 32', 'Sweet 16', 'Elite 8'];
var ROUND_SIZES = [8, 4, 2, 1];
var ROUND_LABELS = ['R64', 'R32', 'S16', 'E8', 'FF', 'NCG'];
var PICK_FILES = [
  'brady', 'steve', 'gracie', 'kristy', 'kylan', 'larry',
  'laura', 'lisa', 'molly', 'peggy', 'sammy', 'shawn'
];

var STYLE_MAP = {
  'Brady': 'Duke or die trying',
  'Steve': 'Cool, calm, and Wildcat',
  'Gracie': 'Tenn. State over Iowa St.?!',
  'Kristy': 'Silent but deadly',
  'Kylan': 'TCU truther, Arizona dreamer',
  'Larry': 'RIP Wisconsin, gone too soon',
  'Laura': 'PVAM > Florida, she said',
  'Lisa': '8 upsets and a dream',
  'Molly': 'Iowa St. over Michigan? Bold.',
  'Peggy': 'Husky nation, ride or die',
  'Sammy': 'Troy believer, chaos enjoyer',
  'Shawn': '10 upsets, maximum chaos'
};

var _tournament, _results, _allPicks, _eliminated;
var _realResults; /* always the unmodified results */
var _simData = null; /* results_sim.json output, null if not loaded */
var _whatIfStack = []; /* [{team:'Illinois', outcome:'championship'}, ...] */
var _whatIfOpen = false;

function getEliminated(results) {
  var elim = {};
  var i, j, g, rr;
  for (i = 0; i < REGIONS.length; i++) {
    rr = results.results[REGIONS[i]];
    for (j = 0; j < 8; j++) {
      g = rr.round1[j];
      if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
    }
    for (j = 0; j < 4; j++) {
      g = rr.round2[j];
      if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
    }
    for (j = 0; j < 2; j++) {
      g = rr.sweet16[j];
      if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
    }
    g = rr.elite8;
    if (g && g.status === 'final' && g.loser) elim[g.loser] = true;
  }
  var ff = results.final_four;
  if (ff.semifinal1 && ff.semifinal1.status === 'final' && ff.semifinal1.loser) elim[ff.semifinal1.loser] = true;
  if (ff.semifinal2 && ff.semifinal2.status === 'final' && ff.semifinal2.loser) elim[ff.semifinal2.loser] = true;
  if (ff.championship && ff.championship.status === 'final' && ff.championship.loser) elim[ff.championship.loser] = true;
  return elim;
}

function scorePicks(picks, results, eliminated) {
  var score = 0;
  var maxPossible = 0;
  var roundCorrect = [0, 0, 0, 0, 0, 0];
  var i, j, k, rr, rp, g, pick, roundIdx;

  for (i = 0; i < REGIONS.length; i++) {
    rr = results.results[REGIONS[i]];
    rp = picks.regions[REGIONS[i]];
    for (k = 0; k < ROUND_KEYS.length; k++) {
      roundIdx = k;
      var pts = SCORING[k];
      if (k < 3) {
        var arr = rr[ROUND_KEYS[k]];
        var parr = rp[ROUND_KEYS[k]];
        for (j = 0; j < ROUND_SIZES[k]; j++) {
          g = arr[j];
          pick = parr[j];
          if (g && g.status === 'final') {
            if (g.winner === pick) { score += pts; maxPossible += pts; roundCorrect[roundIdx]++; }
          } else {
            if (!eliminated[pick]) { maxPossible += pts; }
          }
        }
      } else {
        g = rr.elite8;
        pick = rp.elite8;
        if (g && g.status === 'final') {
          if (g.winner === pick) { score += pts; maxPossible += pts; roundCorrect[roundIdx]++; }
        } else {
          if (!eliminated[pick]) { maxPossible += pts; }
        }
      }
    }
  }
  var ff = results.final_four;
  var pfour = picks.final_four;
  var semi1pick = pfour.east_south_winner;
  if (ff.semifinal1 && ff.semifinal1.status === 'final') {
    if (ff.semifinal1.winner === semi1pick) { score += SCORING[4]; maxPossible += SCORING[4]; roundCorrect[4]++; }
  } else { if (!eliminated[semi1pick]) maxPossible += SCORING[4]; }
  var semi2pick = pfour.west_midwest_winner;
  if (ff.semifinal2 && ff.semifinal2.status === 'final') {
    if (ff.semifinal2.winner === semi2pick) { score += SCORING[4]; maxPossible += SCORING[4]; roundCorrect[4]++; }
  } else { if (!eliminated[semi2pick]) maxPossible += SCORING[4]; }
  var champPick = picks.champion;
  if (ff.championship && ff.championship.status === 'final') {
    if (ff.championship.winner === champPick) { score += SCORING[5]; maxPossible += SCORING[5]; roundCorrect[5]++; }
  } else { if (!eliminated[champPick]) maxPossible += SCORING[5]; }

  return { score: score, maxPossible: maxPossible, roundCorrect: roundCorrect, champEliminated: !!eliminated[picks.champion] };
}

function getTeamDepth(picks) {
  var depth = {};
  var r, i, rp;
  for (r = 0; r < REGIONS.length; r++) {
    rp = picks.regions[REGIONS[r]];
    for (i = 0; i < rp.round1.length; i++) { if (!depth[rp.round1[i]]) depth[rp.round1[i]] = 1; }
    for (i = 0; i < rp.round2.length; i++) { depth[rp.round2[i]] = 2; }
    for (i = 0; i < rp.sweet16.length; i++) { depth[rp.sweet16[i]] = 3; }
    depth[rp.elite8] = 4;
  }
  depth[picks.final_four.east_south_winner] = 5;
  depth[picks.final_four.west_midwest_winner] = 5;
  depth[picks.champion] = 6;
  return depth;
}

function getWatchGame(picks, tournament, results) {
  var depth = getTeamDepth(picks);
  var DEPTH_LABELS = {1:'R1 pick',2:'to R32',3:'to Sweet 16',4:'to Elite 8',5:'to Final Four',6:'champ pick!'};
  var bestDepth = 0;
  var bestText = '';
  var r, j, g, game, topTeam, botTeam, pickedTeam, pickedDepth, opponent;
  for (r = 0; r < REGIONS.length; r++) {
    var rr = results.results[REGIONS[r]];
    var games = tournament.regions[REGIONS[r]].games;
    for (j = 0; j < 8; j++) {
      g = rr.round1[j];
      if (g && g.status === 'final') continue;
      if (!g || g.status === 'pending') {
        game = games[j];
        topTeam = game.top_team;
        botTeam = game.bottom_team;
        pickedTeam = picks.regions[REGIONS[r]].round1[j];
        pickedDepth = depth[pickedTeam] || 0;
        if (pickedDepth > bestDepth) {
          bestDepth = pickedDepth;
          opponent = (pickedTeam === topTeam) ? botTeam : topTeam;
          bestText = '<span class="watch-team">' + pickedTeam + '</span> vs ' + opponent + ' <span class="watch-reason">- ' + DEPTH_LABELS[pickedDepth] + '</span>';
        }
      }
    }
  }
  if (!bestText) return '';
  return '<span class="watch-icon">\uD83D\uDCFA</span> ' + bestText;
}

function getPerfectRegions(picks, results, eliminated) {
  var perfList = [];
  for (var r = 0; r < REGIONS.length; r++) {
    var reg = REGIONS[r];
    var rr = results.results[reg];
    var rp = picks.regions[reg];
    var perfect = true;
    var played = 0;
    var g, pick, j2, j3;

    /* R1 */
    for (var j = 0; j < 8; j++) {
      g = rr.round1[j]; pick = rp.round1[j];
      if (g && g.status === 'final') { played++; if (g.winner !== pick) { perfect = false; break; } }
      else { if (eliminated[pick]) { perfect = false; break; } }
    }
    if (!perfect) continue;

    /* R2 */
    for (j2 = 0; j2 < 4; j2++) {
      g = rr.round2[j2]; pick = rp.round2[j2];
      if (g && g.status === 'final') { played++; if (g.winner !== pick) { perfect = false; break; } }
      else { if (eliminated[pick]) { perfect = false; break; } }
    }
    if (!perfect) continue;

    /* S16 */
    for (j3 = 0; j3 < 2; j3++) {
      g = rr.sweet16[j3]; pick = rp.sweet16[j3];
      if (g && g.status === 'final') { played++; if (g.winner !== pick) { perfect = false; break; } }
      else { if (eliminated[pick]) { perfect = false; break; } }
    }
    if (!perfect) continue;

    /* E8 */
    g = rr.elite8; pick = rp.elite8;
    if (g && g.status === 'final') { played++; if (g.winner !== pick) perfect = false; }
    else { if (eliminated[pick]) perfect = false; }

    if (perfect) perfList.push(REGION_NAMES[reg] + ' (' + played + '/15)');
  }
  return perfList;
}

function getAward(picks, tournament, results, eliminated) {
  var name = picks.participant;
  var r, j, rp, game, upsetCount = 0, bigUpsets = [];

  /* Count upset picks (lower seed picked) */
  for (r = 0; r < REGIONS.length; r++) {
    var games = tournament.regions[REGIONS[r]].games;
    rp = picks.regions[REGIONS[r]];
    for (j = 0; j < 8; j++) {
      game = games[j];
      var pick = rp.round1[j];
      if (pick === game.bottom_team && game.bottom_seed > game.top_seed) {
        upsetCount++;
        var diff = game.bottom_seed - game.top_seed;
        if (diff >= 8) bigUpsets.push('(' + game.bottom_seed + ')' + pick);
        else if (diff >= 4) bigUpsets.push('(' + game.bottom_seed + ')' + pick);
      }
    }
  }

  /* Check specific patterns */
  var allR1 = [];
  for (r = 0; r < REGIONS.length; r++) {
    rp = picks.regions[REGIONS[r]];
    for (j = 0; j < rp.round1.length; j++) allR1.push(rp.round1[j]);
  }

  /* 16 seed pick */
  var has16 = false;
  for (r = 0; r < REGIONS.length; r++) {
    var games2 = tournament.regions[REGIONS[r]].games;
    rp = picks.regions[REGIONS[r]];
    if (rp.round1[0] === games2[0].bottom_team) has16 = true;
  }

  /* Check for eliminated champion with high upsets */
  var champDead = !!eliminated[picks.champion];

  /* Assign awards based on bracket personality */
  if (has16) return '\uD83E\uDD2F 16-Seed Believer';
  if (upsetCount >= 10) return '\uD83C\uDF2A Agent of Chaos';
  if (upsetCount >= 7) return '\uD83D\uDD25 Upset Artist';

  /* Check for specific team loyalties */
  var depth = getTeamDepth(picks);
  var champTeam = picks.champion;

  if (champTeam === 'Duke') return '\uD83D\uDE08 Blue Devil Disciple';
  if (champTeam === 'UConn') return '\uD83D\uDC3E Husky Faithful';
  if (champTeam === 'Florida') return '\uD83D\uDC0A Gator Believer';
  if (champTeam === 'Wisconsin' && champDead) return '\uD83E\uDEA6 Badger Dreamer (RIP)';

  /* Check for picking lots of Big Ten teams deep */
  var bigTen = ['Michigan', 'Iowa St.', 'Ohio St.', 'Illinois', 'Nebraska', 'Purdue', 'Wisconsin', 'MICHST'];
  var bigTenDeep = 0;
  for (var t = 0; t < bigTen.length; t++) {
    if (depth[bigTen[t]] && depth[bigTen[t]] >= 3) bigTenDeep++;
  }
  if (bigTenDeep >= 4) return '\uD83C\uDFC8 Big Ten Loyalist';

  /* Midwest/region specific */
  if (picks.regions.midwest.elite8 === 'Iowa St.' && depth['Iowa St.'] >= 4) return '\uD83C\uDF2A Cyclone Rider';

  /* Default based on upset count */
  if (upsetCount <= 2) return '\uD83D\uDCCA Chalk Talk';
  if (upsetCount >= 5) return '\uD83C\uDFB2 Roll the Dice';

  /* Fallbacks by name for unique bracket traits */
  if (depth['UCLA'] >= 4) return '\uD83C\uDF1F Bruin Booster';
  if (depth['Villanova'] >= 3) return '\uD83D\uDE3C Wildcat Watcher';
  if (depth['McNeese'] >= 2 || depth['Troy'] >= 1) return '\uD83C\uDF1F Cinderella Hunter';

  return '\uD83C\uDFC0 Bracketologist';
}

function findTeamRegion(team) {
  for (var r = 0; r < REGIONS.length; r++) {
    var games = _tournament.regions[REGIONS[r]].games;
    for (var j = 0; j < games.length; j++) {
      if (games[j].top_team === team || games[j].bottom_team === team) return REGIONS[r];
    }
  }
  return null;
}

function findR1Index(region, team) {
  var games = _tournament.regions[region].games;
  for (var j = 0; j < games.length; j++) {
    if (games[j].top_team === team || games[j].bottom_team === team) return j;
  }
  return -1;
}

function getTeamPath(region, r1idx) {
  var sfSlot = (region === 'east' || region === 'south') ? 0 : 1;
  return [
    { region: region, slot: r1idx },
    { region: region, slot: Math.floor(r1idx / 2) },
    { region: region, slot: Math.floor(r1idx / 4) },
    { region: region, slot: 0 },
    { region: 'ff', slot: sfSlot },
    { region: 'champ', slot: 0 }
  ];
}

function pathsConflict(pathA, pathB, atRound) {
  for (var r = 0; r <= atRound; r++) {
    if (pathA[r].region === pathB[r].region && pathA[r].slot === pathB[r].slot) return true;
  }
  return false;
}

function simulateWins(team, outcome, baseResults) {
  var sim = JSON.parse(JSON.stringify(baseResults));
  var region = findTeamRegion(team);
  if (!region) return sim;
  var rr = sim.results[region];
  var r1idx = findR1Index(region, team);
  var r2slot = Math.floor(r1idx / 2);
  var s16slot = Math.floor(r2slot / 2);
  var sfKey = (region === 'east' || region === 'south') ? 'semifinal1' : 'semifinal2';

  function isGF(g) { return g && typeof g === 'object' && g.status === 'final'; }
  function mk(winner, loser) { return { winner: winner, loser: loser, score: 'SIM', status: 'final' }; }

  var game0 = _tournament.regions[region].games[r1idx];
  function r1Opp() { return game0.top_team === team ? game0.bottom_team : game0.top_team; }
  function r2Opp() { var adj = (r1idx % 2 === 0) ? r1idx + 1 : r1idx - 1; return isGF(rr.round1[adj]) ? rr.round1[adj].winner : null; }
  function s16Opp() { var adj = (r2slot % 2 === 0) ? r2slot + 1 : r2slot - 1; return isGF(rr.round2[adj]) ? rr.round2[adj].winner : null; }
  function e8Opp() { var adj = s16slot === 0 ? 1 : 0; return isGF(rr.sweet16[adj]) ? rr.sweet16[adj].winner : null; }
  function sfOpp() {
    var pr = (region === 'east') ? 'south' : (region === 'south') ? 'east' : (region === 'west') ? 'midwest' : 'west';
    var pe = sim.results[pr].elite8;
    return (pe && typeof pe === 'object' && pe.status === 'final') ? pe.winner : null;
  }
  function champOpp() {
    var oKey = sfKey === 'semifinal1' ? 'semifinal2' : 'semifinal1';
    var o = sim.final_four[oKey];
    return (o && typeof o === 'object' && o.status === 'final') ? o.winner : null;
  }

  var roundMap = { r2: 1, r3: 2, region: 3, ff: 4, championship: 5 };
  var target;
  if (outcome === 'next') {
    if (!isGF(rr.round1[r1idx])) target = 0;
    else if (!isGF(rr.round2[r2slot])) target = 1;
    else if (!isGF(rr.sweet16[s16slot])) target = 2;
    else if (!isGF(rr.elite8)) target = 3;
    else if (!isGF(sim.final_four[sfKey])) target = 4;
    else target = 5;
  } else {
    target = roundMap[outcome];
  }

  if (target >= 0 && !isGF(rr.round1[r1idx])) rr.round1[r1idx] = mk(team, r1Opp());
  if (target >= 1 && !isGF(rr.round2[r2slot])) rr.round2[r2slot] = mk(team, r2Opp());
  if (target >= 2 && !isGF(rr.sweet16[s16slot])) rr.sweet16[s16slot] = mk(team, s16Opp());
  if (target >= 3 && (!rr.elite8 || !isGF(rr.elite8))) rr.elite8 = mk(team, e8Opp());
  if (target >= 4 && !isGF(sim.final_four[sfKey])) sim.final_four[sfKey] = mk(team, sfOpp());
  if (target >= 5 && !isGF(sim.final_four.championship)) sim.final_four.championship = mk(team, champOpp());

  return sim;
}

function replayStack() {
  var sim = JSON.parse(JSON.stringify(_realResults));
  for (var i = 0; i < _whatIfStack.length; i++) {
    sim = simulateWins(_whatIfStack[i].team, _whatIfStack[i].outcome, sim);
  }
  return sim;
}

function getAliveTeams() {
  var elim = getEliminated(_realResults);
  var alive = [];
  for (var r = 0; r < REGIONS.length; r++) {
    var games = _tournament.regions[REGIONS[r]].games;
    for (var j = 0; j < games.length; j++) {
      if (!elim[games[j].top_team]) alive.push(games[j].top_team);
      if (!elim[games[j].bottom_team]) alive.push(games[j].bottom_team);
    }
  }
  /* deduplicate */
  var seen = {};
  var unique = [];
  for (var i = 0; i < alive.length; i++) {
    if (!seen[alive[i]]) { seen[alive[i]] = true; unique.push(alive[i]); }
  }
  unique.sort();
  return unique;
}

function getAvailableOutcomes(team) {
  var region = findTeamRegion(team);
  if (!region) return [];
  var r1idx = findR1Index(region, team);
  var teamPath = getTeamPath(region, r1idx);

  var rr = _realResults.results[region];
  var r2slot = Math.floor(r1idx / 2);
  var s16slot = Math.floor(r2slot / 2);
  var sfKey = (region === 'east' || region === 'south') ? 'semifinal1' : 'semifinal2';
  function isGF(g) { return g && typeof g === 'object' && g.status === 'final'; }

  var currentRound = 0;
  if (isGF(rr.round1[r1idx])) currentRound = 1;
  if (currentRound >= 1 && isGF(rr.round2[r2slot])) currentRound = 2;
  if (currentRound >= 2 && isGF(rr.sweet16[s16slot])) currentRound = 3;
  if (currentRound >= 3 && rr.elite8 && isGF(rr.elite8)) currentRound = 4;
  if (currentRound >= 4 && isGF(_realResults.final_four[sfKey])) currentRound = 5;

  var allOC = [
    { value: 'next', label: 'wins next game', targetRound: currentRound },
    { value: 'r2', label: 'wins Round of 32', targetRound: 1 },
    { value: 'r3', label: 'wins Sweet 16', targetRound: 2 },
    { value: 'region', label: 'wins region', targetRound: 3 },
    { value: 'ff', label: 'wins Final Four', targetRound: 4 },
    { value: 'championship', label: 'wins championship', targetRound: 5 }
  ];

  var available = [];
  for (var o = 0; o < allOC.length; o++) {
    var oc = allOC[o];
    if (oc.value !== 'next' && oc.targetRound < currentRound) continue;
    if (oc.value === 'next') {
      var dominated = false;
      for (var oo = 1; oo < allOC.length; oo++) {
        if (allOC[oo].targetRound === currentRound) { dominated = true; break; }
      }
      if (dominated) continue;
    }
    var blocked = false;
    for (var c = 0; c < _whatIfStack.length; c++) {
      if (!_whatIfStack[c].team || !_whatIfStack[c].outcome) continue;
      var cReg = findTeamRegion(_whatIfStack[c].team);
      if (!cReg) continue;
      var cIdx = findR1Index(cReg, _whatIfStack[c].team);
      var cPath = getTeamPath(cReg, cIdx);
      if (pathsConflict(teamPath, cPath, oc.targetRound)) { blocked = true; break; }
    }
    if (!blocked) available.push(oc);
  }
  return available;
}

function pickStatus(pick, gameResult, eliminated) {
  if (gameResult && gameResult.status === 'final') {
    if (gameResult.winner === pick) return 'correct';
    return 'wrong';
  }
  if (eliminated[pick]) return 'doomed';
  return 'pending';
}

function pickChip(team, status) {
  var icon = '';
  if (status === 'correct') icon = '\u2705 ';
  if (status === 'wrong') icon = '\u274C ';
  return '<span class="pick-chip pick-' + status + '">' + icon + team + '</span>';
}

function ffPickStatus(pick, gameResult, eliminated) {
  if (gameResult && gameResult.status === 'final') {
    if (gameResult.winner === pick) return 'correct';
    return 'wrong';
  }
  if (eliminated[pick]) return 'doomed';
  return 'pending';
}

  var ocSel = document.getElementById('wi-outcome-' + rowIdx);
  var team = sel.value;
  ocSel.innerHTML = '<option value="">-- pick outcome --</option>';

  _whatIfStack[rowIdx].team = team;
  var outcomes = getAvailableOutcomes(team);
  for (var i = 0; i < outcomes.length; i++) {
    ocSel.innerHTML += '<option value="' + outcomes[i].value + '">' + outcomes[i].label + '</option>';
  }
  /* Refresh standings back to real since outcome is now cleared */
  refreshWithWhatIf();

function onOutcomeSelect(rowIdx) {
  var sel = document.getElementById('wi-team-' + rowIdx);
  var ocSel = document.getElementById('wi-outcome-' + rowIdx);
  if (!sel.value || !ocSel.value) return;
  _whatIfStack[rowIdx] = { team: sel.value, outcome: ocSel.value };

  _whatIfStack.push({ team: '', outcome: '' });

}

function deleteWhatIf(idx) {
  _whatIfStack.splice(idx);
  refreshWithWhatIf();
}

function resetWhatIf() {
  _whatIfStack = [];
  refreshWithWhatIf();
}

function toggleWhatIf() {
  _whatIfOpen = !_whatIfOpen;

}

function refreshWithWhatIf() {
  var activeCount = 0;
  for (var i = 0; i < _whatIfStack.length; i++) {
    if (_whatIfStack[i].team && _whatIfStack[i].outcome) activeCount++;
  }
  var simResults = activeCount > 0 ? replayStack() : _realResults;
  _results = simResults;

  }
  html += '</div>';
  html += '</div></div>';

  return html;

function showStandings() {
  if (_realResults) {
    refreshWithWhatIf();
  } else {
    render(_tournament, _results, _allPicks);
  }
}

function render(tournament, results, allPicks) {
  var eliminated = getEliminated(results);
  _tournament = tournament;
  _results = results;
  _allPicks = allPicks;
  _eliminated = eliminated;

  var standings = [];
  var i;

  /* Build standings with original index for detail lookup */
  for (i = 0; i < allPicks.length; i++) {
    var p = allPicks[i];
    var s = scorePicks(p, results, eliminated);
    standings.push({
      idx: i,
      name: p.participant,
      champion: p.champion,
      notes: p.notes || '',
      score: s.score,
      maxPossible: s.maxPossible,
      roundCorrect: s.roundCorrect,
      champEliminated: s.champEliminated,
      watchGame: getWatchGame(p, tournament, results),
      perfectRegions: getPerfectRegions(p, results, eliminated),
      award: getAward(p, tournament, results, eliminated),
      style: STYLE_MAP[p.participant] || ''
    });
  }

  standings.sort(function(a, b) {
    if (b.score !== a.score) return b.score - a.score;
    return b.maxPossible - a.maxPossible;
  });

  var finalCount = 0;
  var fcr, fci;
  for (var fc = 0; fc < REGIONS.length; fc++) {
    fcr = results.results[REGIONS[fc]];
    for (fci = 0; fci < 8; fci++) { if (fcr.round1[fci] && fcr.round1[fci].status === 'final') finalCount++; }
    for (fci = 0; fci < 4; fci++) { if (fcr.round2[fci] && fcr.round2[fci].status === 'final') finalCount++; }
    for (fci = 0; fci < 2; fci++) { if (fcr.sweet16[fci] && fcr.sweet16[fci].status === 'final') finalCount++; }
    if (fcr.elite8 && fcr.elite8.status === 'final') finalCount++;
  }
  var ffr = results.final_four;
  if (ffr.semifinal1 && ffr.semifinal1.status === 'final') finalCount++;
  if (ffr.semifinal2 && ffr.semifinal2.status === 'final') finalCount++;
  if (ffr.championship && ffr.championship.status === 'final') finalCount++;

  var simByPid = {};
  var simStale = false;
  if (_simData && _simData.participants) {
    for (var si = 0; si < _simData.participants.length; si++) {
      var sp = _simData.participants[si];
      simByPid[sp.pid] = sp;
    }
    if (_simData.computed_at_game_count !== finalCount) simStale = true;
  }

  var html = '';

  html += '<div class="scoring-info">';
  html += finalCount + ' of 63 games complete | R64=1 | R32=2 | S16=3 | E8=5 | FF=8 | Champ=13';
  html += '</div>';

  html += '<div class="legend">';
  html += '<span><span class="dot dot-green"></span> Champ alive</span>';
  html += '<span><span class="dot dot-red"></span> Champ eliminated</span>';
  html += '</div>';

  html += renderWhatIfControls();

  /* ---- MOBILE CARDS ---- */
  html += '<div class="cards">';
  for (i = 0; i < standings.length; i++) {
    var st = standings[i];
    var cardCls = i === 0 ? 'card rank1' : 'card';
    html += '<div class="' + cardCls + '" onclick="showDetail(' + st.idx + ')">';

    html += '<div class="card-top">';
    html += '<span class="card-rank">#' + (i + 1) + '</span>';
    html += '<span class="card-name">' + st.name + '</span>';
    html += '<span class="card-score">' + st.score + '</span>';
    html += '<span class="card-max">/' + st.maxPossible + '</span>';
    html += '</div>';

    html += '<div class="card-mid">';
    var champClass = st.champEliminated ? 'champ-dead' : 'champ-alive';
    var champIcon = st.champEliminated ? '\u274C ' : '\uD83C\uDFC6 ';
    html += '<span class="card-champ ' + champClass + '">' + champIcon + st.champion + '</span>';
    html += '</div>';

    var simEntry = simByPid[PICK_FILES[st.idx]];
    if (simEntry) {
      var winColor = simStale ? '#888' : '#51cf66';
      var kpColor = simStale ? '#888' : '#4a9eff';
      var winLine = 'Win%: <strong style="color:' + winColor + '">' + simEntry.win_pct.toFixed(1) + '%</strong>';
      if (_simData.has_kenpom && simEntry.win_pct_kp !== null) {
        winLine += ' <span style="color:#666;font-size:0.9em">|</span> KenPom: <strong style="color:' + kpColor + '">' + simEntry.win_pct_kp.toFixed(1) + '%</strong>';
      }
      html += '<div class="card-winpct">' + winLine + '</div>';
    }
    var popsCardVal = st.name === 'Steve' ? '50.1%' : (st.name === 'Sammy' ? '49.9%' : '50.0%');
    html += '<div class="card-winpct" title="Probabilistic Outcome Predictor System">POPS: <strong style="color:#f7c948">' + popsCardVal + '</strong></div>';
    if (st.name === 'Sammy') {
      html += '<div class="card-winpct">SAM: <strong style="font-size:1.1em">\uD83C\uDFAF participation</strong></div>';
    } else {
      html += '<div class="card-winpct">SAM: <span style="color:#888">computing <span class="sam-dots"><span>.</span><span>.</span><span>.</span></span></span></div>';
    }

    if (st.style) {
      html += '<div class="card-style">"' + st.style + '"</div>';
    }

    if (st.watchGame) {
      html += '<div class="card-watch">' + st.watchGame + '</div>';
    }

    if (st.award) {
      html += '<div class="card-badge">' + st.award + '</div>';
    }

    if (st.perfectRegions.length > 0) {
      html += '<div class="card-perfect">\u2B50 Perfect region alive: ' + st.perfectRegions.join(', ') + '</div>';
    }

    html += '<div class="card-rounds">';
    for (var r = 0; r < 6; r++) {
      var val = st.roundCorrect[r];
      var valCls = val > 0 ? 'rnd-has' : 'rnd-zero';
      html += '<div class="round-pip">';
      html += '<span class="rnd-label">' + ROUND_LABELS[r] + '</span>';
      html += '<span class="rnd-val ' + valCls + '">' + val + '</span>';
      html += '</div>';
    }
    html += '</div>';

    html += '</div>';
  }
  html += '</div>';

  /* ---- DESKTOP TABLE ---- */
  html += '<div class="standings-table">';
  html += '<table>';
  html += '<tr>';
  html += '<th>Rank</th><th>Name</th><th>Score</th><th>Max</th>';
  if (_simData) {
    var staleAttr = simStale ? ' title="Stale - run simulate.py"' : '';
    html += '<th' + staleAttr + '>Win% (50/50)</th>';
    if (_simData.has_kenpom) { html += '<th' + staleAttr + '>Win% (KenPom)</th>'; }
  }
  html += '<th title="Probabilistic Outcome Predictor System">POPS</th>';
  html += '<th>SAM</th>';
  html += '<th>Champion</th><th>Style Points</th><th>Award</th>';
  for (var h = 0; h < 6; h++) { html += '<th>' + ROUND_LABELS[h] + '</th>'; }
  html += '</tr>';

  for (i = 0; i < standings.length; i++) {
    var st2 = standings[i];
    var rankClass = i === 0 ? ' class="rank1"' : '';
    html += '<tr' + rankClass + '>';
    html += '<td class="rank-cell">' + (i + 1) + '</td>';
    html += '<td class="name-cell" onclick="showDetail(' + st2.idx + ')">' + st2.name + '</td>';
    html += '<td class="score">' + st2.score + '</td>';
    html += '<td class="max-possible">' + st2.maxPossible + '</td>';
    if (_simData) {
      var simEntry2 = simByPid[PICK_FILES[st2.idx]];
      var flatStr = simEntry2 ? simEntry2.win_pct.toFixed(1) + '%' : '\u2014';
      html += '<td style="color:' + (simStale ? '#888' : '#51cf66') + ';font-weight:700">' + flatStr + '</td>';
      if (_simData.has_kenpom) {
        var kpStr = (simEntry2 && simEntry2.win_pct_kp !== null) ? simEntry2.win_pct_kp.toFixed(1) + '%' : '\u2014';
        html += '<td style="color:' + (simStale ? '#888' : '#4a9eff') + ';font-weight:700">' + kpStr + '</td>';
      }
    }
    var popsVal = st2.name === 'Steve' ? '50.1%' : (st2.name === 'Sammy' ? '49.9%' : '50.0%');
    html += '<td style="color:#f7c948;font-weight:700;font-size:0.8em" title="Probabilistic Outcome Predictor System">' + popsVal + '</td>';
    if (st2.name === 'Sammy') {
      html += '<td style="font-size:1.1em">\uD83C\uDFAF participation</td>';
    } else {
      html += '<td style="color:#888;font-size:0.85em">computing <span class="sam-dots"><span>.</span><span>.</span><span>.</span></span></td>';
    }
    var champClass2 = st2.champEliminated ? 'champ-dead' : 'champ-alive';
    var champDisplay2 = st2.champEliminated ? '\u274C ' + st2.champion : st2.champion;
    html += '<td class="' + champClass2 + '">' + champDisplay2 + '</td>';
    html += '<td class="style-pts">' + (st2.style || '') + '</td>';
    html += '<td style="font-size:0.75em;color:#c9a0dc;font-style:italic">' + (st2.award || '') + '</td>';
    for (var r2 = 0; r2 < 6; r2++) {
      var val2 = st2.roundCorrect[r2];
      var cls2 = val2 > 0 ? 'round-correct' : 'round-zero';
      html += '<td class="' + cls2 + '">' + val2 + '</td>';
    }
    html += '</tr>';
  }

  html += '</table></div>';
  if (_simData) {
    if (simStale) {
      html += '<div style="font-size:0.75em;color:#ff6b35;text-align:center;margin-top:6px">\u26A0 Win% computed after game ' + _simData.computed_at_game_count + ' \u2014 run simulate.py to update</div>';
    } else {
      html += '<div style="font-size:0.75em;color:#888;text-align:center;margin-top:6px">Win% from ' + _simData.total_scenarios.toLocaleString() + ' simulated scenarios \u2014 rerun simulate.py after each update</div>';
    }
  }
  html += '<div class="updated">Last updated: ' + results.last_updated + ' | Source: ' + results.source + '</div>';
  document.getElementById('output').innerHTML = html;
}

function run() {
  var tournamentData, resultsData;
  var allPicks = [];
  var i;
  var bust = '?v=' + Date.now();

  Promise.all([
    fetch('data/tournament.json' + bust).then(function(r) { return r.json(); }),
    fetch('data/results.json' + bust).then(function(r) { return r.json(); }),
    fetch('data/results_sim.json' + bust).then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(baseData) {
    tournamentData = baseData[0];
    resultsData = baseData[1];
    _simData = baseData[2];
    var fetches = [];
    for (i = 0; i < PICK_FILES.length; i++) {
      fetches.push(
        fetch('data/picks/' + PICK_FILES[i] + '.json' + bust).then(function(r) { return r.json(); })
      );
    }
    return Promise.all(fetches);
  }).then(function(picks) {
    allPicks = picks;
    _realResults = JSON.parse(JSON.stringify(resultsData));
    render(tournamentData, resultsData, allPicks);
  }).catch(function(err) {
    document.getElementById('output').innerHTML = '<div class="error">Error loading data: ' + err.message + '</div>';
  });
}

run();
</script>
</body>
</html>
